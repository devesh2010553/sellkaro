<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Feedback | SellKaro</title>
<meta name="description" content="Share feedback, suggestions, or report an issue with SellKaro.">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="site-header"><div id="site-header"></div></header>

<section class="page-header">
  <div class="container">
    <h1>Send feedback</h1>
    <p>Found a bug, have a suggestion, or just want to tell us something? We read every message.</p>
  </div>
</section>

<section>
  <div class="container" style="max-width:560px;">
    <form id="feedback-form" class="card" style="padding:28px;">
      <div class="field-group">
        <label class="field-label">Your name (optional)</label>
        <input type="text" id="fb-name" placeholder="Your name">
      </div>
      <div class="field-group">
        <label class="field-label">Your email (optional, in case we need to follow up)</label>
        <input type="email" id="fb-email" placeholder="you@example.com">
      </div>
      <div class="field-group">
        <label class="field-label">Type</label>
        <select id="fb-type">
          <option>Suggestion</option>
          <option>Bug</option>
          <option>Complaint</option>
          <option>Praise</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field-group">
        <label class="field-label">Your message</label>
        <textarea id="fb-message" required maxlength="2000" placeholder="Tell us what's on your mind..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="fb-submit">Send feedback</button>
    </form>
  </div>
</section>

<footer class="site-footer"><div id="site-footer"></div></footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="/js/firebase-config.js"></script>
<script src="/js/app.js"></script>
<script>
  renderHeader('feedback');

  document.getElementById('feedback-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('fb-submit');
    btn.disabled = true;
    btn.textContent = 'Sending...';
    try {
      const data = await apiCall('/feedback', {
        method: 'POST',
        body: {
          name: document.getElementById('fb-name').value.trim(),
          email: document.getElementById('fb-email').value.trim(),
          type: document.getElementById('fb-type').value,
          message: document.getElementById('fb-message').value.trim()
        }
      });
      showToast(data.message, 'success');
      document.getElementById('feedback-form').reset();
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send feedback';
    }
  });
</script>
</body>
</html>
