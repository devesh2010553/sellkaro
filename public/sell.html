<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post a Free Ad to Sell Your Car or Item | SellKaro</title>
<meta name="description" content="Post a free ad to sell your old car, bike, or anything else. Listings are reviewed before going live. 5% commission applies only when it sells.">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="site-header"><div id="site-header"></div></header>

<section class="page-header">
  <div class="container">
    <h1>Post a free ad</h1>
    <p>Your ad will be reviewed by our team before it appears publicly &mdash; usually within a few hours.</p>
  </div>
</section>

<section id="gate-section" style="display:none;">
  <div class="container text-center" style="max-width:480px;">
    <div class="card" style="padding:32px;">
      <h3 id="gate-title">Please log in to post an ad</h3>
      <p class="text-muted text-sm" id="gate-msg"></p>
      <a href="/login.html?redirect=/sell.html" class="btn btn-primary mt-16" id="gate-action">Log in</a>
    </div>
  </div>
</section>

<section id="form-section" style="display:none;">
  <div class="container" style="max-width:680px;">
    <form id="ad-form" class="card" style="padding:28px;">
      <div class="field-group">
        <label class="field-label">Category</label>
        <select id="ad-category" required>
          <option value="Cars">Cars</option>
          <option value="Bikes">Bikes</option>
          <option value="Mobiles">Mobiles</option>
          <option value="Electronics">Electronics</option>
          <option value="Furniture">Furniture</option>
          <option value="Property">Property</option>
          <option value="Jobs">Jobs</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="field-group">
        <label class="field-label">Title</label>
        <input type="text" id="ad-title" required maxlength="120" placeholder="e.g. 2018 Maruti Swift VDI, single owner">
      </div>

      <div class="field-group">
        <label class="field-label">Price (₹)</label>
        <input type="number" id="ad-price" required min="1" placeholder="e.g. 450000">
      </div>

      <div id="car-fields" style="display:none;">
        <div class="field-row">
          <div class="field-group"><label class="field-label">Brand</label><input type="text" id="car-brand" placeholder="e.g. Maruti Suzuki"></div>
          <div class="field-group"><label class="field-label">Model</label><input type="text" id="car-model" placeholder="e.g. Swift"></div>
        </div>
        <div class="field-row">
          <div class="field-group"><label class="field-label">Year</label><input type="number" id="car-year" placeholder="e.g. 2018"></div>
          <div class="field-group"><label class="field-label">KM driven</label><input type="number" id="car-km" placeholder="e.g. 45000"></div>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">Fuel type</label>
            <select id="car-fuel"><option value="">Select</option><option>Petrol</option><option>Diesel</option><option>CNG</option><option>Electric</option><option>Hybrid</option></select>
          </div>
          <div class="field-group">
            <label class="field-label">Transmission</label>
            <select id="car-transmission"><option value="">Select</option><option>Manual</option><option>Automatic</option></select>
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Number of owners</label>
          <input type="number" id="car-owners" min="1" placeholder="e.g. 1">
        </div>
      </div>

      <div class="field-row">
        <div class="field-group"><label class="field-label">City</label><input type="text" id="ad-city" placeholder="e.g. Agra"></div>
        <div class="field-group"><label class="field-label">State</label><input type="text" id="ad-state" placeholder="e.g. Uttar Pradesh"></div>
      </div>

      <div class="field-group">
        <label class="field-label">Description</label>
        <textarea id="ad-description" required maxlength="5000" placeholder="Describe the item's condition, history, and anything a buyer should know."></textarea>
      </div>

      <div class="field-group">
        <label class="field-label">Photos (up to 8)</label>
        <input type="file" id="ad-images" accept="image/*" multiple>
        <div class="hint">Clear, well-lit photos help your item sell faster.</div>
      </div>

      <div class="commission-note mb-24">
        <label class="flex gap-12" style="align-items:flex-start; cursor:pointer;">
          <input type="checkbox" id="ad-terms" required style="width:auto; margin-top:3px;">
          <span>I understand and agree that if this item sells through SellKaro, a <strong>5% commission</strong> on the final sale price is owed to SellKaro, as described in the <a href="/terms.html" target="_blank" style="text-decoration:underline;">Terms &amp; Conditions</a>.</span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="ad-submit">Submit for review</button>
    </form>
  </div>
</section>

<footer class="site-footer"><div id="site-footer"></div></footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="/js/firebase-config.js"></script>
<script src="/js/app.js"></script>
<script>
  renderHeader('sell');

  document.getElementById('ad-category').addEventListener('change', (e) => {
    document.getElementById('car-fields').style.display = e.target.value === 'Cars' ? 'block' : 'none';
  });

  document.addEventListener('authready', (e) => {
    const { firebaseUser } = e.detail;
    if (!firebaseUser) {
      document.getElementById('gate-section').style.display = 'block';
      document.getElementById('gate-title').textContent = 'Please log in to post an ad';
      document.getElementById('gate-msg').textContent = "You'll need a free account so we can verify you and let buyers reach you safely.";
      return;
    }
    if (!firebaseUser.emailVerified) {
      document.getElementById('gate-section').style.display = 'block';
      document.getElementById('gate-title').textContent = 'Please verify your email';
      document.getElementById('gate-msg').textContent = "You're logged in, but you need to verify your email before posting an ad.";
      const action = document.getElementById('gate-action');
      action.href = '/verify-email.html';
      action.textContent = 'Verify email';
      return;
    }
    document.getElementById('form-section').style.display = 'block';
  });

  document.getElementById('ad-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('ad-submit');
    const category = document.getElementById('ad-category').value;

    const formData = new FormData();
    formData.append('category', category);
    formData.append('title', document.getElementById('ad-title').value.trim());
    formData.append('price', document.getElementById('ad-price').value);
    formData.append('description', document.getElementById('ad-description').value.trim());
    formData.append('city', document.getElementById('ad-city').value.trim());
    formData.append('state', document.getElementById('ad-state').value.trim());

    if (category === 'Cars') {
      formData.append('brand', document.getElementById('car-brand').value.trim());
      formData.append('model', document.getElementById('car-model').value.trim());
      formData.append('year', document.getElementById('car-year').value);
      formData.append('kmDriven', document.getElementById('car-km').value);
      formData.append('fuelType', document.getElementById('car-fuel').value);
      formData.append('transmission', document.getElementById('car-transmission').value);
      formData.append('owners', document.getElementById('car-owners').value);
    }

    const files = document.getElementById('ad-images').files;
    for (let i = 0; i < files.length; i++) formData.append('images', files[i]);

    btn.disabled = true;
    btn.textContent = 'Submitting...';

    try {
      const token = await getAuthToken();
      const res = await fetch('/api/ads', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: formData
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Could not submit ad.');

      showToast(data.message || 'Ad submitted for review!', 'success');
      setTimeout(() => window.location.href = '/dashboard.html', 1200);
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Submit for review';
    }
  });
</script>
</body>
</html>
